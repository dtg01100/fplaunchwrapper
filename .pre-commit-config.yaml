repos:
  # Code formatting and linting with ruff (modern alternative to flake8, isort, etc.)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Type checking with mypy
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        # No extra deps needed: click, pydantic, rich, watchdog, and
        # other runtime libs ship their own type hints (PEP 561).
        # The previous `types-all` meta-package had yanked transitive
        # deps that broke installation on modern Python.
        # We still need to list `click` (and rich) as additional
        # dependencies so mypy can find them in the pre-commit venv,
        # even though they ship their own py.typed markers.
        additional_dependencies:
          - click>=8.1.0
          - rich>=13.0.0
          - pydantic>=2.0.0
          - tomli>=2.0.0
          - tomli-w>=1.0.0
          - watchdog>=3.0.0
        # Match the local `python3 -m mypy lib/` invocation:
        # scope is `lib/`, no `--strict` flag (the pyproject.toml
        # [tool.mypy] section controls the actual strictness).
        files: ^lib/
        args: []

  # YAML validation
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-json
        exclude: ^\.devcontainer/devcontainer\.json$
        # devcontainer.json is JSON5 (allows // comments + trailing
        # commas) and the upstream check-json hook only accepts
        # strict JSON. The dev container spec doesn't have a
        # JSON-strict validator, so we exclude it.
      - id: end-of-file-fixer
      - id: trailing-whitespace
        # Pass `--markdown-linebreak-ext` as two separate args
        # (the hook's argparse uses action='append' so each invocation
        # adds an extension). The newer hook rejects commas inside
        # a single value; pass them as two args instead.
        args: [--markdown-linebreak-ext=md, --markdown-linebreak-ext=markdown]
      - id: check-merge-conflict
      - id: detect-private-key

  # Security scanning with bandit
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.6
    hooks:
      - id: bandit
        args: [--config, .bandit.yml]
        exclude: ^tests/

  # Docstring checking
  - repo: https://github.com/PyCQA/pydocstyle
    rev: 6.3.0
    hooks:
      - id: pydocstyle
        additional_dependencies: [toml]
        exclude: ^(tests/|setup\.py)

# Configuration
default_language_version:
  python: python3.12

ci:
  autofix_commit_msg: 'chore: auto-fix linting issues'
  autofix_prs: true
  autoupdate_commit_msg: 'chore: pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: [mypy]  # Skip mypy in CI (runs separately in GitHub Actions)
