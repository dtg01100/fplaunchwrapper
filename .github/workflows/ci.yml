name: CI

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  python-tests:
    name: Python Tests (Full Suite)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install UV package manager
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Install dependencies
      run: |
        uv pip install --system -e ".[monitor]"
        uv pip install --system 'pytest<9.1.0' pytest-mock pytest-timeout pytest-xdist tomli tomli-w 'pydantic>=2.0.0' hypothesis

    - name: Run Python tests
      env:
        HOME: ${{ runner.temp }}
        XDG_CONFIG_HOME: ''
        XDG_DATA_HOME: ''
      run: |
        # Run unit tests but skip tests/python/formal_verification/ on CI.
        # The formal verification suite (~750 tests) exercises multi-
        # process concurrency, crash-injection, real bash scripts, and
        # 200-example Hypothesis runs. These are invaluable for local
        # verification (run in <40s) but have been observed to hang on
        # GitHub-hosted runners in ways that don't reproduce locally --
        # the watchdog thread in pytest-timeout is starved under runner
        # load and pytest never returns. Per-test --timeout=300 and job
        # timeout-minutes: 15 bound the worst case; ignoring the heavy
        # suite keeps the job fast and reliable.
        #
        # To run the formal verification suite locally:
        #   python3 -m pytest tests/python/formal_verification/ -v
        python3 -m pytest tests/python/ \
          --ignore=tests/python/formal_verification \
          --timeout=300
  package-validation:
    name: Package Installation Test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Test Python package installation
      run: |
        python3 -m pip install -e .
        python3 -c "import lib; print('Python package imports successfully')"
        python3 -c "from lib.generate import WrapperGenerator; print('Package functionality works')"

  lint-and-security:
    name: Lint and Security Scan
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install UV package manager
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Install linting dependencies
      run: |
        uv pip install --system ruff bandit mypy

    - name: Run ruff linter
      run: |
        python3 -m ruff check lib/ tests/ --output-format=concise

    - name: Run bandit security scan
      run: |
        python3 -m bandit -r lib/ -c .bandit.yml -ll

    - name: Run mypy type checker
      run: |
        python3 -m mypy lib/ --ignore-missing-imports --follow-imports=skip
