name: CI

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  python-tests:
    name: Python Tests (Full Suite)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install UV package manager
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Install dependencies
      run: |
        uv pip install --system -e ".[monitor]"
        uv pip install --system 'pytest<9.1.0' pytest-mock pytest-timeout pytest-xdist tomli tomli-w hypothesis

    - name: Run Python tests
      env:
        HOME: ${{ runner.temp }}
        XDG_CONFIG_HOME: ''
        XDG_DATA_HOME: ''
        XDG_CACHE_HOME: ''
      run: |
        python3 -m pytest tests/python/ -v --timeout=300 --timeout-method=thread

  package-validation:
    name: Package Installation Test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Test Python package installation
      run: |
        python3 -m pip install -e .
        python3 -c "import lib; print('Python package imports successfully')"
        python3 -c "from lib.generate import WrapperGenerator; print('Package functionality works')"

  lint-and-security:
    name: Lint and Security Scan
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install UV package manager
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Install linting dependencies
      run: |
        uv pip install --system ruff bandit mypy

    - name: Run ruff linter
      run: |
        python3 -m ruff check lib/ tests/ --output-format=concise

    - name: Run bandit security scan
      run: |
        python3 -m bandit -r lib/ -c .bandit.yml -ll

    - name: Run mypy type checker
      run: |
        python3 -m mypy lib/ --ignore-missing-imports --follow-imports=skip
