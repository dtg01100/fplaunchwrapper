# Bandit security scanning configuration (YAML format)
# See: https://bandit.readthedocs.io/en/latest/config.html

# Directories to exclude from scanning
exclude_dirs:
  - /test
  - /tests
  - .venv
  - venv
  - .git
  - __pycache__

# Skip specific tests
skips:
  - B101  # assert statement - disabled due to false positives with assertions used for validation
  - B404  # import subprocess - needed for flatpak command execution
  - B603  # subprocess without shell=True - safer approach
  - B607  # startfile with shell=True - not applicable to Linux
  - B611  # xmlrpc client - not used
  - B701  # xml.etree - not used

# Assert usage settings
assert_used:
  skip_on_assert_true: false
  skip_on_assert_variable_true: false
